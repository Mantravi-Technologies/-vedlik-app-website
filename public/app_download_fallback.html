<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Open Vedlik</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #fff;
        background: radial-gradient(circle at 20% 20%, #112025 0%, #040607 56%, #000 100%);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(560px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(8px);
        border-radius: 16px;
        padding: 24px;
      }
      h1 {
        margin: 0;
        font-size: clamp(1.3rem, 2.2vw, 1.8rem);
        line-height: 1.1;
      }
      p {
        margin: 12px 0 0;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.5;
      }
      .row {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        border: 1px solid rgba(45, 212, 191, 0.5);
        color: #fff;
        text-decoration: none;
        padding: 10px 14px;
        background: linear-gradient(90deg, #0a1114, #102b2f, #0a1114);
        font-weight: 600;
        font-size: 0.9rem;
      }
      a.link {
        display: inline-flex;
        align-items: center;
        color: #2dd4bf;
        text-decoration: none;
        font-size: 0.88rem;
        padding: 10px 8px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Open Vedlik</h1>
      <p>
        If Vedlik is installed, this link should open the app automatically (Universal Links / App Links).
        If you are still on this page, get the app from your store below.
      </p>
      <div class="row">
        <a id="store-link" class="button" href="#" rel="noreferrer">Get the app</a>
        <a class="link" href="/">Open website</a>
      </div>
    </main>
    <script>
      (function () {
        var APP_STORE =
          "https://apps.apple.com/in/app/vedlik-ai-tech-insights/id6761024663";
        var PLAY_STORE =
          "https://play.google.com/store/apps/details?id=com.mantravi.ai.briefing";

        var ua = navigator.userAgent || "";
        var isIOS =
          /iPad|iPhone|iPod/.test(ua) ||
          (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
        var isAndroid = /Android/i.test(ua);

        var storeLink = document.getElementById("store-link");
        if (!storeLink) return;

        var storeUrl = PLAY_STORE;
        var label = "Get it on Google Play";
        if (isIOS) {
          storeUrl = APP_STORE;
          label = "Download on App Store";
        }
        storeLink.href = storeUrl;
        storeLink.textContent = label;

        // After a short delay, send phones to the store if the app did not take over
        // (skip while tab is hidden — e.g. app opened in foreground).
        if (isIOS || isAndroid) {
          var delayMs = 1800;
          window.setTimeout(function () {
            if (document.visibilityState !== "visible") return;
            window.location.replace(storeUrl);
          }, delayMs);
        }
      })();
    </script>
  </body>
</html>
