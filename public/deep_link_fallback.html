<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Open in Vedlik</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #fff;
        background: radial-gradient(circle at 20% 20%, #112025 0%, #040607 56%, #000 100%);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(560px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(8px);
        border-radius: 16px;
        padding: 24px;
      }
      h1 {
        margin: 0;
        font-size: clamp(1.3rem, 2.2vw, 1.8rem);
        line-height: 1.1;
      }
      p {
        margin: 12px 0 0;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.5;
      }
      .id {
        margin-top: 10px;
        font-size: 0.85rem;
        color: rgba(45, 212, 191, 0.9);
        word-break: break-all;
      }
      .row {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        border: 1px solid rgba(45, 212, 191, 0.5);
        color: #fff;
        text-decoration: none;
        padding: 10px 14px;
        background: linear-gradient(90deg, #0a1114, #102b2f, #0a1114);
        font-weight: 600;
        font-size: 0.9rem;
      }
      a.link {
        display: inline-flex;
        align-items: center;
        color: #2dd4bf;
        text-decoration: none;
        font-size: 0.88rem;
        padding: 10px 8px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1 id="headline">Open this article in Vedlik</h1>
      <p id="lede">
        If Vedlik is installed, opening this link from Messages/Notes/WhatsApp should launch the app.
      </p>
      <p id="article-id" class="id" hidden></p>
      <div class="row">
        <a id="store-link" class="button" href="https://play.google.com/store/apps/details?id=com.mantravi.ai.briefing" rel="noreferrer">Get the app</a>
        <a class="link" href="/">Open website</a>
      </div>
    </main>
    <script>
      (function () {
        var APP_STORE =
          "https://apps.apple.com/in/app/vedlik-ai-tech-insights/id6761024663";
        var PLAY_STORE =
          "https://play.google.com/store/apps/details?id=com.mantravi.ai.briefing";

        var path = window.location.pathname || "";
        var id = "";
        var m = path.match(/^\/article\/(.+)$/);
        if (m && m[1]) id = decodeURIComponent(m[1]);

        var isAppDownload =
          id === "download" || id === "app" || id === "get";

        var headline = document.getElementById("headline");
        var lede = document.getElementById("lede");
        if (isAppDownload && headline && lede) {
          headline.textContent = "Open Vedlik";
          lede.textContent =
            "If Vedlik is installed, this link should open the app (same as other vedlik.com/article links). If you stay in the browser, use your store below.";
          document.title = "Open Vedlik";
        }

        var articleEl = document.getElementById("article-id");
        if (id && articleEl && !isAppDownload) {
          articleEl.hidden = false;
          articleEl.textContent = "Article ID: " + id;
        }

        var ua = navigator.userAgent || "";
        var isIOS =
          /iPad|iPhone|iPod/.test(ua) ||
          (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
        var isAndroid = /Android/i.test(ua);
        var storeLink = document.getElementById("store-link");
        if (!storeLink) return;

        if (isIOS) {
          storeLink.href = APP_STORE;
          storeLink.textContent = "Download on App Store";
        } else {
          storeLink.href = PLAY_STORE;
          storeLink.textContent = "Get it on Google Play";
        }

        // If the app did not open, send phones to the store after a short delay
        // (only for app-download slugs — article pages stay manual).
        if (isAppDownload && (isIOS || isAndroid)) {
          var target = isIOS ? APP_STORE : PLAY_STORE;
          window.setTimeout(function () {
            if (document.visibilityState !== "visible") return;
            window.location.replace(target);
          }, 1800);
        }
      })();
    </script>
  </body>
</html>
